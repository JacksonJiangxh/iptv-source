name: Run IPTV Aggregator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run script
      run: python main.py
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Results
      run: |
        for file in input.m3u input.txt output.m3u output.txt failed_sources.log github_sources.log new-aliasdemo.txt README.md; do
          if [ -f "$file" ]; then
            git add "$file"
          fi
        done
        if git diff --staged --quiet; then
          echo "没有变更需要提交"
        else
          BEIJING_TIME=$(date -d '+8 hours' '+%Y-%m-%d %H:%M:%S' 2>/dev/null || date -v+8H '+%Y-%m-%d %H:%M:%S')
          git commit -m "🔄 自动更新 IPTV 播放列表 ($BEIJING_TIME 北京时间)"
          git push
        fi
